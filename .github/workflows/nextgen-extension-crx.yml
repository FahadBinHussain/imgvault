name: Build Nextgen Extension

on:
  push:
    branches:
      - '**'
    paths:
      - '.github/workflows/nextgen-extension-crx.yml'
      - 'nextgen-extension/**'
  release:
    types:
      - published

jobs:
  build-crx:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        shell: bash
        working-directory: nextgen-extension

    env:
      EXTENSION_DIR: nextgen-extension
      DIST_DIR: dist
      ARTIFACT_DIR: artifacts
      KEY_PATH: .ci/extension.pem
      EXTENSION_NAME: imgvault-nextgen
      ROLLING_TAG: nextgen-extension-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: nextgen-extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension bundle
        run: pnpm exec vite build

      - name: Copy extension static files
        run: |
          cp manifest.json dist/manifest.json
          cp flickr-fix.css dist/flickr-fix.css
          cp slideshare-fix.css dist/slideshare-fix.css
          cp rajce-fix.css dist/rajce-fix.css
          rm -rf dist/icons
          cp -R icons dist/icons

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Prepare signing key
        env:
          EXTENSION_PRIVATE_KEY_B64: ${{ secrets.EXTENSION_PRIVATE_KEY_B64 }}
        run: |
          if [ -z "$EXTENSION_PRIVATE_KEY_B64" ]; then
            echo "Missing required secret: EXTENSION_PRIVATE_KEY_B64" >&2
            exit 1
          fi

          mkdir -p "$(dirname "$KEY_PATH")" "$ARTIFACT_DIR"
          printf '%s' "$EXTENSION_PRIVATE_KEY_B64" | base64 --decode > "$KEY_PATH"

      - name: Create ZIP package
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          ZIP_NAME="${EXTENSION_NAME}-${VERSION}.zip"
          cd dist
          zip -r "../artifacts/${ZIP_NAME}" .

      - name: Pack CRX
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          CRX_NAME="${EXTENSION_NAME}-${VERSION}.crx"
          "${{ steps.chrome.outputs.chrome-path }}" \
            --no-sandbox \
            --pack-extension="$GITHUB_WORKSPACE/$EXTENSION_DIR/$DIST_DIR" \
            --pack-extension-key="$GITHUB_WORKSPACE/$EXTENSION_DIR/$KEY_PATH"

          mv "$GITHUB_WORKSPACE/$EXTENSION_DIR/${DIST_DIR}.crx" "$GITHUB_WORKSPACE/$EXTENSION_DIR/$ARTIFACT_DIR/$CRX_NAME"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextgen-extension-zip
          path: nextgen-extension/artifacts/*.zip
          if-no-files-found: error

      - name: Upload CRX artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextgen-extension-crx
          path: nextgen-extension/artifacts/*.crx
          if-no-files-found: error

      - name: Update rolling release tag
        if: github.event_name == 'push'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$ROLLING_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$ROLLING_TAG" --force

      - name: Attach artifacts to GitHub release
        if: github.event_name == 'release' || github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && env.ROLLING_TAG || github.event.release.tag_name }}
          name: ${{ github.event_name == 'push' && 'Latest extension build' || github.event.release.name }}
          body: ${{ github.event_name == 'push' && format('Automated build from `{0}` at commit `{1}`.', github.ref_name, github.sha) || '' }}
          prerelease: ${{ github.event_name == 'push' }}
          files: |
            nextgen-extension/artifacts/*.zip
            nextgen-extension/artifacts/*.crx
