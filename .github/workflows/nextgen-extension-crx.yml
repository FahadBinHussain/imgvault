name: Build Extension + Native Host

on:
  push:
    branches:
      - '**'
    paths:
      - '.github/workflows/nextgen-extension-crx.yml'
      - 'nextgen-extension/**'
      - 'native-host/**'
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  build-extension-packages:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        shell: bash
        working-directory: nextgen-extension

    env:
      EXTENSION_DIR: nextgen-extension
      DIST_DIR: dist
      ARTIFACT_DIR: artifacts
      KEY_PATH: .ci/extension.pem
      EXTENSION_NAME: imgvault-nextgen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: nextgen-extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension bundle
        run: pnpm exec vite build

      - name: Read extension version
        id: extension-version
        run: |
          echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Copy extension static files
        run: |
          cp manifest.json dist/manifest.json
          cp flickr-fix.css dist/flickr-fix.css
          cp slideshare-fix.css dist/slideshare-fix.css
          cp rajce-fix.css dist/rajce-fix.css
          cp src/content/contextmenu-unlock.js dist/contextmenu-unlock.js
          rm -rf dist/icons
          cp -R icons dist/icons

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Prepare signing key
        env:
          IMGVAULT_EXTENSION_PEM_B64: ${{ secrets.IMGVAULT_EXTENSION_PEM_B64 }}
        run: |
          if [ -z "$IMGVAULT_EXTENSION_PEM_B64" ]; then
            echo "Missing required secret: IMGVAULT_EXTENSION_PEM_B64" >&2
            exit 1
          fi

          mkdir -p "$(dirname "$KEY_PATH")" "$ARTIFACT_DIR"
          printf '%s' "$IMGVAULT_EXTENSION_PEM_B64" | base64 --decode > "$KEY_PATH"

      - name: Create ZIP package
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          ZIP_NAME="${EXTENSION_NAME}-${VERSION}.zip"
          cd dist
          zip -r "../artifacts/${ZIP_NAME}" .

      - name: Pack CRX
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          CRX_NAME="${EXTENSION_NAME}-${VERSION}.crx"
          "${{ steps.chrome.outputs.chrome-path }}" \
            --no-sandbox \
            --pack-extension="$GITHUB_WORKSPACE/$EXTENSION_DIR/$DIST_DIR" \
            --pack-extension-key="$GITHUB_WORKSPACE/$EXTENSION_DIR/$KEY_PATH"

          mv "$GITHUB_WORKSPACE/$EXTENSION_DIR/${DIST_DIR}.crx" "$GITHUB_WORKSPACE/$EXTENSION_DIR/$ARTIFACT_DIR/$CRX_NAME"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextgen-extension-zip
          path: nextgen-extension/artifacts/*.zip
          if-no-files-found: error

      - name: Upload CRX artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextgen-extension-crx
          path: nextgen-extension/artifacts/*.crx
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        if: github.event_name == 'release' || github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || format('v{0}-build.{1}', steps.extension-version.outputs.version, github.run_number) }}
          name: ${{ github.event_name == 'release' && github.event.release.name || format('ImgVault v{0} Build {1}', steps.extension-version.outputs.version, github.run_number) }}
          body: ${{ github.event_name == 'release' && github.event.release.body || format('Automated production build from `{0}` (run {1}).', github.ref_name, github.run_number) }}
          prerelease: ${{ github.event_name == 'release' && github.event.release.prerelease || false }}
          draft: ${{ github.event_name == 'release' && github.event.release.draft || false }}
          files: |
            nextgen-extension/artifacts/*.zip
            nextgen-extension/artifacts/*.crx

  build-native-host:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read extension version
        id: extension-version
        shell: pwsh
        run: |
          $manifest = Get-Content "nextgen-extension/manifest.json" -Raw | ConvertFrom-Json
          "version=$($manifest.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build native host
        working-directory: native-host
        shell: pwsh
        run: |
          cargo build --release --manifest-path src-tauri/Cargo.toml
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item src-tauri/target/release/imgvault-native-host.exe artifacts/ImgVault-Native-Host.exe

      - name: Upload native host artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-host-exe
          path: native-host/artifacts/ImgVault-Native-Host.exe
          if-no-files-found: error

      - name: Attach native host to GitHub release
        if: github.event_name == 'release' || github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || format('v{0}-build.{1}', steps.extension-version.outputs.version, github.run_number) }}
          name: ${{ github.event_name == 'release' && github.event.release.name || format('ImgVault v{0} Build {1}', steps.extension-version.outputs.version, github.run_number) }}
          body: ${{ github.event_name == 'release' && github.event.release.body || format('Automated production build from `{0}` (run {1}).', github.ref_name, github.run_number) }}
          prerelease: ${{ github.event_name == 'release' && github.event.release.prerelease || false }}
          draft: ${{ github.event_name == 'release' && github.event.release.draft || false }}
          files: |
            native-host/artifacts/ImgVault-Native-Host.exe
